services:
  whisperx:
    image: whisperx-docker:latest
    build:
      context: .
      dockerfile: Dockerfile
    # Чтобы использовать GPU, раскомментируйте следующие строки:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    environment:
      # Можно переопределять через переменные окружения:
      # WHISPERX_MODEL: base
      # WHISPERX_DEVICE: cpu
      # WHISPERX_COMPUTE_TYPE: int8
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ./input:/input
      - ./output:/output
      - ./config:/config
      - whisperx-cache:/root/.cache/huggingface
    # По умолчанию обрабатывает всё из /input в /output
    command: --input_dir /input --output_dir /output

volumes:
  whisperx-cache:
